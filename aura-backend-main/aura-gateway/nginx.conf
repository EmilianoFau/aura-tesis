worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile        on;
    keepalive_timeout 65;
    server_tokens   off;

    # Limit upload body size to prevent trivial DoS via large payloads.
    # /processing/ and /chat/ need larger limits for file uploads.
    client_max_body_size 50M;

    # Rate-limiting zones (keyed by client IP).
    # auth: tight limit — login/refresh endpoints are brute-force targets.
    # api:  general limit for all other upstream services.
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:10m  rate=60r/s;

    # Global security headers applied to every response.
    add_header X-Frame-Options           "SAMEORIGIN"             always;
    add_header X-Content-Type-Options    "nosniff"                always;
    add_header Referrer-Policy           "strict-origin"          always;
    add_header X-XSS-Protection          "1; mode=block"          always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;

    server {
        listen 80;
        server_name _;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Default proxy timeouts — individual locations override where needed.
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # Gateway liveness probe — unauthenticated, not proxied.
        location = /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Auth service — tight rate limit (login, refresh, validate).
        location /auth/ {
            limit_req zone=auth burst=20 nodelay;
            proxy_pass http://aura-auth-service:8000/;
        }

        # Chat service — WebSocket upgrade + general rate limit.
        location /chat/ {
            limit_req zone=api burst=50 nodelay;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_pass http://aura-chat-service:8000/;
        }

        # LLM service — long timeouts for inference, rate-limited.
        location /llm/ {
            limit_req zone=api burst=10 nodelay;
            proxy_read_timeout    300s;
            proxy_connect_timeout 300s;
            proxy_send_timeout    300s;
            proxy_pass http://aura-llm-service:8000/;
        }

        # Document processing — long timeouts for uploads + ML processing.
        location /processing/ {
            limit_req zone=api burst=10 nodelay;
            client_max_body_size  500M;
            proxy_read_timeout    300s;
            proxy_connect_timeout 300s;
            proxy_send_timeout    300s;
            proxy_pass http://aura-document-processing-service:8000/;
        }

        # Document collection / MAC service.
        location /collections/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://aura-document-collection-service:8000/;
        }

        # Notification service — SSE stream needs unbuffered long-lived connection.
        location /notifications/ {
            limit_req zone=api burst=50 nodelay;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_pass http://aura-notification-service:8000/;
        }
    }
}
