x-healthcheck-defaults: &healthcheck-defaults
  interval: 15s
  timeout: 120s
  retries: 5
  start_period: 30s

x-healthcheck-api-v1: &healthcheck-api-v1
  <<: *healthcheck-defaults
  test:
    - CMD-SHELL
    - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)"

x-healthcheck-metrics: &healthcheck-metrics
  <<: *healthcheck-defaults
  test:
    - CMD-SHELL
    - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/metrics', timeout=5)"

x-healthcheck-celery-worker: &healthcheck-celery-worker
  interval: 30s
  timeout: 120s
  retries: 5
  start_period: 45s
  test:
    - CMD-SHELL
    - celery -A aura_notification_service inspect ping --timeout 10 2>/dev/null | grep -q pong || exit 1

services:
  aura-document-processing-service:
    build:
      context: ../../aura-document-processing-service
      dockerfile: DockerfileGPU
    container_name: aura-document-processing-service
    ports:
      - "8000:8000"
    env_file:
      - ../../aura-document-processing-service/env/.env.docker.gpu
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      # Models are pre-baked into the image (/opt/cache/huggingface); never hit
      # the Hub at runtime so an expired/missing HF_TOKEN can't break startup.
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      NVIDIA_VISIBLE_DEVICES: all
    depends_on:
      aura_db:
        condition: service_healthy
      storage:
        condition: service_healthy
      queue:
        condition: service_healthy
      llm:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-api-v1
      start_period: 600s
    restart: unless-stopped
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  aura-llm-service:
    build: ../../aura-llm-service
    container_name: aura-llm-service
    ports:
      - "8001:8000"
    env_file:
      - ../../aura-llm-service/env/.env.docker.gpu
    depends_on:
      llm:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-api-v1
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      NVIDIA_VISIBLE_DEVICES: all

  aura-auth-service:
    build: ../../aura-auth-service
    container_name: aura-auth-service
    ports:
      - "8002:8000"
    env_file:
      - ../../aura-auth-service/.env.docker
    depends_on:
      auth_db:
        condition: service_healthy
      aura_db:
        condition: service_healthy
    healthcheck: *healthcheck-metrics
    restart: unless-stopped

  aura-chat-service:
    build: ../../aura-chat-service
    container_name: aura-chat-service
    ports:
      - "8003:8000"
    env_file:
      - ../../aura-chat-service/env/.env.docker
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    depends_on:
      aura_db:
        condition: service_healthy
      memory_db:
        condition: service_healthy
      aura-llm-service:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-api-v1
      start_period: 300s
    restart: unless-stopped
    volumes:
      - huggingface_cache:/app/.cache/huggingface

  aura-notification-service:
    build: ../../aura-notification-service
    container_name: aura-notification-service
    ports:
      - "8004:8000"
    env_file:
      - ../../aura-notification-service/.env.docker
    depends_on:
      aura_db:
        condition: service_healthy
      memory_db:
        condition: service_healthy
      queue:
        condition: service_healthy
      aura-auth-service:
        condition: service_healthy
    healthcheck: *healthcheck-api-v1
    restart: unless-stopped

  aura-notification-worker:
    build: ../../aura-notification-service
    container_name: aura-notification-worker
    command:
      - celery
      - -A
      - aura_notification_service
      - worker
      - --loglevel=info
      - --concurrency=2
      - --queues=notifications
    env_file:
      - ../../aura-notification-service/.env.docker
    depends_on:
      aura_db:
        condition: service_healthy
      memory_db:
        condition: service_healthy
      queue:
        condition: service_healthy
      aura-notification-service:
        condition: service_healthy
    healthcheck: *healthcheck-celery-worker
    restart: unless-stopped

  aura-document-collection-service:
    build: ../../aura-document-collection-service
    container_name: aura-document-collection-service
    ports:
      - "8005:8000"
    env_file:
      - ../../aura-document-collection-service/.env.docker
    depends_on:
      aura_db:
        condition: service_healthy
    healthcheck: *healthcheck-api-v1
    restart: unless-stopped

  llm:
    build:
      context: ../llm
      dockerfile: Dockerfile
    container_name: llm
    env_file:
      - ../../aura-llm-service/env/.env.docker.gpu
      - ../../aura-document-processing-service/env/.env.docker.gpu
    ports:
      - "11434:11434"
    volumes:
      - llm_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      OLLAMA_GPU_OVERHEAD: 0
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-2}
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 120s
      retries: 10
      start_period: 1800s

  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    environment:
      NEO4J_AUTH: neo4j/aura_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_default__listen__address: 0.0.0.0
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_max__size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 120s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  llm_data:
  neo4j_data:
  neo4j_logs:
  huggingface_cache:
