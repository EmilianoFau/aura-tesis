filebeat.autodiscover:
  providers:
    - type: docker
      hints.enabled: true
      templates:
        - condition:
            or:
              - contains:
                  docker.container.name: "aura-auth-service"
              - contains:
                  docker.container.name: "aura-chat-service"
              - contains:
                  docker.container.name: "aura-document-processing-service"
              - contains:
                  docker.container.name: "aura-llm-service"
              - contains:
                  docker.container.name: "mock-auth"
          config:
            - type: container
              paths:
                - /var/lib/docker/containers/${data.docker.container.id}/*.log
              
              processors:
                - decode_json_fields:
                    fields: ["message"]
                    target: ""
                    overwrite_keys: true
                    
                - drop_fields:
                    fields: ["ecs", "agent", "log.offset", "stream", "log.file.path"]
                    ignore_missing: true

output.elasticsearch:
  hosts: ["elasticsearch:9200"]

setup.kibana:
  host: "kibana:5601"

filebeat.config.modules:
  path: ${path.config}/modules.d/*.yml
  reload.enabled: false
