<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>{% block title %}{{ subject }}{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background:#f6f7f9;font-family:Helvetica,Arial,sans-serif;color:#1a1a1a;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
        <tr>
            <td align="center">
                <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="margin:24px;background:#ffffff;border-radius:8px;border:1px solid #e6e6ea;overflow:hidden;">
                    <tr>
                        <td style="background:#1f2937;color:#ffffff;padding:18px 24px;font-size:16px;font-weight:600;">
                            Aura
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:24px;font-size:15px;line-height:1.55;">
                            {% block content %}{% endblock %}
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:16px 24px;border-top:1px solid #f0f0f4;color:#6b7280;font-size:12px;">
                            Este mensaje fue enviado por la plataforma Aura. Si no deseas recibirlo, ajusta tus preferencias en tu cuenta.
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
